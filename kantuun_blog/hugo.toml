baseURL = 'https://spacepakal.github.io/'
languageCode = 'en-us'
title = 'KanTuun'
theme= "atelier"
[frontmatter]
  default = "yaml"

# Main menu items
[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    title = "About"
    url = "/about/"
    weight = -110
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    title = "Posts"
    url = "/posts/"
    weight = -100
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    title = "Categories"
    url = "/categories/"
    weight = -90
  [[menu.main]]
    identifier = "indexes"
    name = "Indexes"
    title = "Indexes"
    url = "/indexes/"
    weight = -80



# Configuration Features
[params]
  description = "Notes on learning, publishing, and building clean systems."
  header_title = "Space Pakal"
  header_subtitle = "A calm place for workflow notes, publishing experiments, and technical writing."
  recent_posts = 5
  mainSections = ["posts", "post", "blog"]
  [[params.social]]
    fa_icon = "fab fa-github fa-1x"          # Font Awesome icon class
    href = "http://github.com/youruser"      # Link to associate with icon (http://, https://, mailto:)
  [[params.social]]
    fa_icon = "fab fa-linkedin-in fa-1x"
    href = ""
  [[params.social]]
    fa_icon = "fab fa-twitter fa-1x"
    href = ""
  [[params.social]]
    fa_icon = "fas fa-at fa-1x"
    href = ""

[taxonomies]
  category = "categories"
  tag = "tags"
